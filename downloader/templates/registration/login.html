<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarwinxSaver - Connexion</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }
        h2 { font-size: 28px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; background: #000; color: white; padding: 12px; border: none; border-radius: 20px; font-weight: 600; cursor: pointer; }
        .help { font-size: 12px; color: #86868b; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Connexion</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Identifiant" required>
            <input type="password" name="password" placeholder="Mot de passe" required>
            <button type="submit" class="btn">Continuer</button>
        </form>
        <p class="help">Nouveau ici ? <a href="{% url 'signup' %}">Créer un compte</a></p>
    </div>
</body>
</html>
